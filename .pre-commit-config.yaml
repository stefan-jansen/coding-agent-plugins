# Pre-commit hooks for Internal Plugin Marketplace
# Install: pre-commit install

repos:
  - repo: local
    hooks:
      - id: mdtoken-check
        name: Markdown Token Limit Check
        entry: mdtoken check
        language: system
        files: \.md$
        pass_filenames: false
        verbose: true
      - id: sync-toolkit-check
        name: Vendored toolkit skills in sync
        entry: scripts/sync-from-toolkit.sh --check
        language: system
        files: ^workflow/skills/
        pass_filenames: false
